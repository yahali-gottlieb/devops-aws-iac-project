---
# 1. התקנות בסיסיות על כל השרתים
- name: Basic Installations on all servers
  hosts: all
  become: yes
  tasks:
    - name: Update APT cache and install common packages
      apt:
        name:
          - curl
          - git
          - python3
          - python3-pip
          - python3-venv
          - libpq-dev  # Required for PostgreSQL connection in Python
        state: present
        update_cache: yes

# 2. הגדרת שרת ה-Frontend (Nginx)
- name: Setup Frontend Server
  hosts: frontend
  become: yes
  tasks:
    - name: Install Nginx
      apt:
        name: nginx
        state: present

    - name: Copy Frontend HTML file
      copy:
        src: app/frontend/index.html
        dest: /var/www/html/index.html
        owner: www-data
        group: www-data
        mode: '0644'

    - name: Configure Nginx with template
      template:
        src: templates/nginx.conf.j2
        dest: /etc/nginx/sites-available/default
      notify: Restart Nginx

  handlers:
    - name: Restart Nginx
      service:
        name: nginx
        state: restarted

# 3. הגדרת שרתי ה-Backend וה-Worker
- name: Setup Backend and Worker Servers
  hosts: backend, worker
  become: yes
  vars_files:
    - secrets.yml
  tasks:
    - name: Create app directory
      file:
        path: /home/ubuntu/app/backend
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    - name: Copy Backend application files
      copy:
        src: app/backend/
        dest: /home/ubuntu/app/backend/
        owner: ubuntu
        group: ubuntu

    - name: Create Python virtual environment and install requirements
      pip:
        requirements: /home/ubuntu/app/backend/requirements.txt
        virtualenv: /home/ubuntu/app/venv
        virtualenv_command: python3 -m venv

    - name: Configure Systemd service for the App
      template:
        src: templates/app.service.j2
        dest: /etc/systemd/system/app.service

    - name: Start and enable App service
      systemd:
        name: app
        state: restarted
        enabled: yes
        daemon_reload: yes

    - name: Setup Cron job for daily worker report
      cron:
        name: "Run DevOps daily report"
        minute: "0"
        hour: "8"
        job: "export DB_HOST={{ rds_endpoint }} && /home/ubuntu/app/venv/bin/python /home/ubuntu/app/backend/worker.py >> /home/ubuntu/app/backend/logs/cron.log 2>&1"
        user: ubuntu